name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-run manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Project site is served at https://<user>.github.io/greenoccasion-web/
          BASE_PATH: /greenoccasion-web/
          # Backend API origin. Set repo Variable VITE_API_BASE_URL to e.g.
          # https://api.greenoccasion.in once the backend is live (empty = no data yet).
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # This site serves ONE journal (its heading/theme come from this slug).
          # A separate journal site would set a different slug.
          VITE_JOURNAL_SLUG: green-occasion
          # Author portal (JMS) for the "Submit Research" handoff.
          VITE_JMS_URL: https://greenoccasion-jms.onrender.com

      - name: SPA fallback (GitHub Pages serves 404.html for unknown paths)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
